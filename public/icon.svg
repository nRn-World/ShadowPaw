<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon glow filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with neon effect -->
  <circle cx="256" cy="256" r="240" fill="#0a0a1a" stroke="#00ffff" stroke-width="8" filter="url(#neonGlow)"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="#ff00ff" stroke-width="3" opacity="0.6" filter="url(#softGlow)"/>
  
  <!-- Cat paw pad (main pad) -->
  <ellipse cx="256" cy="310" rx="65" ry="55" fill="#1a1a2e" stroke="#00ffff" stroke-width="4" filter="url(#softGlow)"/>
  
  <!-- Cat paw toes -->
  <ellipse cx="150" cy="180" rx="40" ry="50" fill="#1a1a2e" stroke="#00ffff" stroke-width="4" filter="url(#softGlow)" transform="rotate(-20, 150, 180)"/>
  <ellipse cx="220" cy="130" rx="35" ry="45" fill="#1a1a2e" stroke="#00ffff" stroke-width="4" filter="url(#softGlow)" transform="rotate(-8, 220, 130)"/>
  <ellipse cx="292" cy="130" rx="35" ry="45" fill="#1a1a2e" stroke="#00ffff" stroke-width="4" filter="url(#softGlow)" transform="rotate(8, 292, 130)"/>
  <ellipse cx="362" cy="180" rx="40" ry="50" fill="#1a1a2e" stroke="#00ffff" stroke-width="4" filter="url(#softGlow)" transform="rotate(20, 362, 180)"/>
  
  <!-- Inner paw pads -->
  <ellipse cx="150" cy="180" rx="25" ry="32" fill="#2d2d4a" transform="rotate(-20, 150, 180)"/>
  <ellipse cx="220" cy="130" rx="22" ry="28" fill="#2d2d4a" transform="rotate(-8, 220, 130)"/>
  <ellipse cx="292" cy="130" rx="22" ry="28" fill="#2d2d4a" transform="rotate(8, 292, 130)"/>
  <ellipse cx="362" cy="180" rx="25" ry="32" fill="#2d2d4a" transform="rotate(20, 362, 180)"/>
  <ellipse cx="256" cy="310" rx="45" ry="38" fill="#2d2d4a"/>
  
  <!-- Highlight accents -->
  <ellipse cx="256" cy="400" rx="80" ry="20" fill="#ff00ff" opacity="0.3" filter="url(#softGlow)"/>
  
  <!-- Star/sparkle decorations -->
  <g fill="#ffff00" filter="url(#softGlow)">
    <polygon points="80,80 85,95 100,95 88,105 93,120 80,110 67,120 72,105 60,95 75,95" transform="scale(0.6) translate(100, 80)"/>
    <polygon points="80,80 85,95 100,95 88,105 93,120 80,110 67,120 72,105 60,95 75,95" transform="scale(0.5) translate(750, 120)"/>
  </g>
</svg>